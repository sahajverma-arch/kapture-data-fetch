name: Kapture CRM → Google Sheets Daily Sync
 
on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST = 3:30 AM UTC
  workflow_dispatch:       # Manual trigger button in GitHub UI
 
jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests gspread google-auth
 
      - name: Run report sync
        env:
          KAPTURE_COOKIE: ${{ secrets.KAPTURE_COOKIE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python fetch_report.py
